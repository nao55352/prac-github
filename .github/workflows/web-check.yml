name: Web Check

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'

jobs:
  html-validate:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.jsをセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: html-validateをインストール
        run: npm install -g html-validate

      - name: HTMLの構文チェック
        run: html-validate apps/web/index.html
