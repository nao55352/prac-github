name: Reusable HTML Check

on:
  workflow_call:
    inputs:
      html-path:
        required: true
        type: string

jobs:
  html-validate:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.jsのセットアップとhtml-validateのインストール
        uses: ./.github/actions/setup-node

      - name: HTMLの構文チェック
        run: html-validate ${{ inputs.html-path }}
