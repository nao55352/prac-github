<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Todoアプリ</title>
</head>
<body>
  <h1>My Todo App v2</h1>
  <input type="text" id="todo-input" placeholder="Todoを入力">
  <button type="button" onclick="addTodo()">追加</button>
  <ul id="todo-list"></ul>

  <script>
    function addTodo() {
      const input = document.getElementById('todo-input');
      const list = document.getElementById('todo-list');
      if (input.value === '') return;
      const li = document.createElement('li');
      li.textContent = input.value;
      list.appendChild(li);
      input.value = '';
    }
  </script>
</body>
</html>
